services:
  - type: web
    name: imageawareplus
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web.app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: VT_API_KEY
        sync: false
      - key: URLSCAN_API_KEY
        sync: false
      - key: PHISHTANK_API_KEY
        sync: false
